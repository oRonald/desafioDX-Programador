<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Integrantes</title>
    <script src="js/script.js" defer></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <h2>Cadastro de Integrantes</h2>

        <form id="formIntegrantes">
            <div>
                <label>Nome:</label>
                <input type="text" id="nome" placeholder="Ronald..." required>
            </div>
            <div>
                <label>Função:</label>
                <input type="text" id="funcao" placeholder="Meio Campo..." required>
            </div>

        <button class="submitIntegrante" type="submit">Cadastrar</button>
        </form>

        <p id="mensagem"></p>
    </div>

</body>
</html>
